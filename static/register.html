<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Inscription</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background-color: #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            border: 1px solid #E5E7EB;
        }
        .auth-card h2 {
            text-align: center;
            color: #1F2937;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
        }
        .form-group label {
            font-weight: 500;
            color: #374151;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            margin-top: 0.25rem;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Créer un compte</h2>
        <form id="register-form">
            
            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="reg-username">Nom d'utilisateur</label>
                <input type="text" id="reg-username" placeholder="Ex: jean_dupont" required>
            </div>

            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="reg-email">Adresse Email</label>
                <input type="email" id="reg-email" placeholder="jean@example.com" required>
            </div>

            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="reg-password">Mot de passe</label>
                <input type="password" id="reg-password" placeholder="••••••••" required minlength="6">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="reg-role">Type de compte</label>
                <select id="reg-role" required>
                    <option value="etudiant">🎓 Étudiant</option>
                    <option value="enseignant">👨‍🏫 Enseignant</option>
                    <option value="promoteur">👑 Promoteur (Admin)</option>
                </select>
            </div>
            
            <button type="submit" style="width: 100%; background: #4F46E5; color: white; padding: 0.75rem; font-size: 1rem; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;">
                S'inscrire
            </button>
        </form>
        
        <div id="message-box" style="margin-top: 1rem;"></div>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem; color: #4B5563;">
            Déjà un compte ? <a href="/login" style="color: #4F46E5; font-weight: 600; text-decoration: none;">Se connecter</a>
        </p>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = "Création en cours...";

            // Inclusion du nouveau champ email
            const payload = {
                username: document.getElementById('reg-username').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                password: document.getElementById('reg-password').value,
                role: document.getElementById('reg-role').value
            };
            
            try {
                // Pointage vers la nouvelle route API standardisée
                await apiCall('/api/auth/register', 'POST', payload);
                showMessage("Inscription réussie ! Redirection vers la connexion...", "success");
                
                setTimeout(() => window.location.href = "/login", 1500);
            } catch (error) {
                // Réactivation du bouton en cas d'erreur
                submitBtn.disabled = false;
                submitBtn.textContent = "S'inscrire";
                console.error("Détail de l'erreur :", error);
            }
        });
    </script>
</body>
</html>
