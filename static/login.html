<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Connexion</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="container">
        <h2>Connexion</h2>
        
        <form id="login-form">
            <div class="form-group">
                <label for="login-identifier">Nom d'utilisateur ou Email</label>
                <input type="text" id="login-identifier" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <br>
            <button type="submit">Se connecter</button>
        </form>

        <div id="message-box"></div>
        
        <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
            Pas encore de compte ? <a href="/register">S'inscrire</a>
        </p>
    </div>

    <script src="/static/js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const identifierInput = document.getElementById('login-identifier');
            const passwordInput = document.getElementById('password');

            if (!form || !identifierInput || !passwordInput) {
                console.error('Formulaire de connexion incomplet : éléments introuvables.');
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const identifier = identifierInput.value.trim();
                const password = passwordInput.value;

                if (!identifier || !password) {
                    showMessage('Veuillez saisir votre identifiant et votre mot de passe.', 'error');
                    return;
                }

                try {
                    const result = await apiCall('/api/auth/login', 'POST', { identifier, password });

                    showMessage('Connexion réussie ! Redirection...', 'success');

                    setTimeout(() => {
                        if (result.role === 'promoteur') {
                            window.location.href = '/promoteur';
                        } else if (result.role === 'enseignant') {
                            window.location.href = '/enseignant';
                        } else if (result.role === 'etudiant') {
                            window.location.href = '/etudiant';
                        } else {
                            showMessage('Erreur : rôle inconnu.', 'error');
                        }
                    }, 1000);
                } catch (error) {
                    console.error('Erreur de connexion :', error);
                    showMessage('Échec de la connexion. Vérifiez vos identifiants.', 'error');
                }
            });
        });
    </script>
</body>
</html>
