<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Dashboard Étudiant</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .badge-status {
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
        .bg-gray { background-color: #6B7280; }
        .bg-blue { background-color: #3B82F6; }
        .bg-green { background-color: #10B981; }
        
        .progress-bar-container {
            width: 100%;
            background-color: #E5E7EB;
            border-radius: 8px;
            height: 8px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: #4F46E5;
            transition: width 0.4s ease;
        }
        
        .evaluation-box {
            background-color: #FEF3C7;
            border: 1px solid #F59E0B;
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>🎓 Mon Espace Apprentissage</h2>
            <button onclick="logout()" class="btn-logout" style="background-color: #EF4444; color: white;">Se déconnecter</button>
        </header>

        <div id="message-box"></div>

        <div class="dashboard-grid">
            
            <div class="stat-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>📚 Mes Cours En Cours</h3>
                    <button id="refresh-btn" onclick="fetchDashboardData()" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">🔄 Actualiser</button>
                </div>
                
                <div id="enrollments-container">
                    <p class="loading-text">Chargement de tes cours...</p>
                </div>
                
                <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #E5E7EB;">
                
                <h4>🔍 Catalogue des Formations</h4>
                <div id="catalog-container">
                    <p class="loading-text">Chargement du catalogue...</p>
                </div>
            </div>

            <div class="stat-card">
                <h3>🏆 Mes Certificats Officiels</h3>
                <p style="font-size: 0.85rem; color: #6B7280; margin-bottom: 1rem;">Seul le Promoteur peut te délivrer les certificats globaux des modules.</p>
                <div id="certificates-container">
                    <p class="loading-text">Chargement de tes succès...</p>
                </div>
            </div>

        </div>

        <div id="study-panel" class="form-card" style="margin-top: 2rem; display: none;"></div>
    </div>

    <script src="/static/js/app.js"></script>
    
    <script>
        let currentStudentUsername = ""; 

        // ==========================================
        // 1. AFFICHAGE DES INSCRIPTIONS ET DU CATALOGUE
        // ==========================================
        
        function renderEnrollments(enrollments) {
            const container = document.getElementById('enrollments-container');
                
            if (!enrollments || enrollments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 2rem 0;">
                        <div style="font-size: 2rem;">📁</div>
                        <p style="color: #6B7280; font-size: 0.9rem;">Tu n'es inscrit à aucun cours.</p>
                    </div>`;
                return;
            }

            let listHTML = '<div style="display: flex; flex-direction: column; gap: 1rem;">';
            enrollments.forEach(cours => {
                let badge = '<span class="badge-status bg-gray">À Commencer</span>';
                if (cours.status === 'en_cours') badge = '<span class="badge-status bg-blue">En Cours</span>';
                if (cours.status === 'termine') badge = '<span class="badge-status bg-green">Terminé</span>';

                listHTML += `
                    <div style="padding: 1rem; background: #F9FAFB; border-radius: 8px; border: 1px solid #E5E7EB;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                            <!-- 🔥 CORRECTION DU UNDEFINED ICI: cours.title au lieu de cours.course_title -->
                            <strong>📖 ${cours.title}</strong>
                            ${badge}
                        </div>
                        <div style="font-size: 0.85rem; color: #4B5563;">Score global: ${cours.progress}%</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: ${cours.progress}%;"></div>
                        </div>
                        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                            <button onclick="loadStudyPanel(${cours.course_id}, '${cours.title.replace(/'/g, "\\'")}')" style="background: #4F46E5; color: white; flex: 1;">Accéder au cours</button>
                            ${cours.status === 'termine' ? `<button onclick="downloadCourseCertificate(${cours.course_id}, '${cours.title.replace(/'/g, "\\'")}')" style="background: #10B981; color: white;">Certificat HTML</button>` : ''}
                        </div>
                    </div>
                `;
            });
            listHTML += '</div>';
            container.innerHTML = listHTML;
        }

        function renderCatalog(courses, enrollments) {
            const targetEl = document.getElementById('catalog-container');
            if (!targetEl) return;

            if (!courses || courses.length === 0) {
                targetEl.innerHTML = '<p style="color: #6B7280; font-style: italic;">Aucun cours dans le catalogue.</p>';
                return;
            }

            const enrolledIds = (enrollments || []).map(e => e.course_id);
            const availableCourses = (courses || []).filter(c => !enrolledIds.includes(c.course_id));

            if (availableCourses.length === 0) {
                targetEl.innerHTML = '<p style="color: #10B981; font-weight: 500; font-size: 0.9rem;">🎉 Tu es inscrit à tous les cours existants !</p>';
                return;
            }

            let catalogHTML = '<div style="display: flex; flex-direction: column; gap: 0.75rem;">';
            availableCourses.forEach(cours => {
                const courseId = cours.course_id;
                const courseTitle = cours.course_title || 'Cours sans titre';
                catalogHTML += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: white; border: 1px solid #E5E7EB; border-radius: 6px;">
                        <span style="font-weight: 500; font-size: 0.9rem;">${courseTitle}</span>
                        <button onclick="enrollInCourse(${courseId})" style="padding: 0.3rem 0.6rem; font-size: 0.8rem; background: #6B7280; color: white;">S'inscrire</button>
                    </div>
                `;
            });
            catalogHTML += '</div>';
            targetEl.innerHTML = catalogHTML;
        }

        // ==========================================
        // 2. ZONE D'ÉTUDE (LEÇONS + ÉVALUATION FINALE 70/30)
        // ==========================================

        async function loadStudyPanel(courseId, courseTitle) {
            const panel = document.getElementById('study-panel');
            panel.style.display = 'block';
            panel.innerHTML = '<p class="loading-text">Chargement du contenu pédagogique...</p>';

            try {
                const data = await apiCall(`/api/etudiant/study/${courseId}`, 'GET');
                const enrollment = data.enrollment;
                const lessons = data.lessons;

                let html = `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #F3F4F6; padding-bottom: 1rem; margin-bottom: 1.5rem;">
                        <h3 style="margin: 0;">📚 Zone d'étude : ${courseTitle}</h3>
                        <button onclick="document.getElementById('study-panel').style.display='none'" style="background: transparent; color: #6B7280;">❌ Fermer</button>
                    </div>
                `;

                if (lessons.length === 0) {
                    html += `<p style="color: #6B7280; font-style: italic;">L'enseignant n'a pas encore ajouté de contenu à ce cours.</p>`;
                } else {
                    html += `<div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">`;
                    
                    lessons.forEach((lesson, index) => {
                        let mediaContent = '<span style="color: #9CA3AF; font-size: 0.8rem;">Aucun fichier</span>';
                        
                        if (lesson.file_path) {
                            let fixedPath = lesson.file_path.startsWith('/') ? lesson.file_path : '/' + lesson.file_path;
                            let fullMediaUrl = `http://127.0.0.1:8000${fixedPath}`;

                            if (lesson.content_type === 'video' || lesson.file_path.endsWith('.mp4')) {
                                mediaContent = `
                                    <video id="video-lesson-${lesson.id}" controls style="width: 100%; margin-top: 10px; border-radius: 6px; max-height: 400px; background: #000;">
                                        <source src="${fullMediaUrl}" type="video/mp4">
                                        Ton navigateur ne supporte pas la vidéo.
                                    </video>
                                    <p id="video-status-${lesson.id}" style="color: #D97706; font-size: 0.85rem; margin-top: 5px; font-weight: bold;">
                                        ⏳ Regardez la vidéo jusqu'à la fin pour valider 70% du cours.
                                    </p>
                                `;
                            } else {
                                mediaContent = `<a href="${fullMediaUrl}" target="_blank" style="color: #4F46E5; font-size: 0.9rem; text-decoration: underline;">Ouvrir le document</a>`;
                            }
                        }

                        html += `
                            <div style="padding: 1rem; border: 1px solid #E5E7EB; border-left: 4px solid #4F46E5; border-radius: 4px;">
                                <strong>Leçon ${index + 1} : ${lesson.title}</strong>
                                <div>${mediaContent}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    
                    if (enrollment.progress >= 70 || enrollment.is_video_read) {
                        html += `
                            <div style="background: #ECFDF5; padding: 0.75rem; border-radius: 8px; text-align: center; margin-bottom: 2rem; color: #065F46; font-size: 0.9rem; font-weight: bold;">
                                ✅ Visionnage validé (70/100 points acquis).
                            </div>
                        `;
                    }
                }

                if ((enrollment.progress >= 70 || enrollment.is_video_read) && enrollment.status !== 'termine') {
                    html += `
                        <div class="evaluation-box">
                            <h4 style="color: #B45309; margin-top: 0; margin-bottom: 1rem;">🎯 Évaluation Finale (30% de la note)</h4>
                            <div id="quiz-container-${courseId}">
                                <button onclick="generateFinalQuiz(${courseId})" style="background: #F59E0B; color: white;">Lancer l'évaluation</button>
                            </div>
                        </div>
                    `;
                } else if (enrollment.status === 'termine') {
                    html += `
                        <div style="background: #ECFDF5; border: 1px solid #10B981; padding: 1.5rem; border-radius: 8px; text-align: center;">
                            <h4 style="color: #065F46; margin-top: 0;">🎉 Cours validé avec succès !</h4>
                            <p style="color: #047857; margin-bottom: 1rem;">Note finale : ${enrollment.progress}%</p>
                            <button onclick="downloadCourseCertificate(${courseId}, '${courseTitle.replace(/'/g, "\\'")}')" style="background: #10B981; color: white;">Voir mon Certificat</button>
                        </div>
                    `;
                }

                panel.innerHTML = html;
                panel.scrollIntoView({ behavior: 'smooth' });

                lessons.forEach(lesson => {
                    const videoElement = document.getElementById(`video-lesson-${lesson.id}`);
                    const statusElement = document.getElementById(`video-status-${lesson.id}`);
                    
                    if (videoElement && enrollment.progress < 70) {
                        videoElement.addEventListener('ended', async () => {
                            statusElement.innerText = "✅ Vidéo terminée ! Enregistrement en cours...";
                            statusElement.style.color = "#10B981";
                            await markPresence(courseId);
                        });
                    } else if (videoElement && enrollment.progress >= 70) {
                         statusElement.style.display = 'none';
                    }
                });

            } catch (error) {
                panel.innerHTML = '<p style="color: #DC2626;">Impossible de charger ce cours.</p>';
            }
        }

        // 3. LOGIQUE MÉTIER (NOTATION ET QUIZ)

        async function markPresence(courseId) {
            try {
                // 🔥 URL Corrigée : Correspond à la route de ton FastAPI
                await apiCall(`/api/etudiant/courses/${courseId}/track-video`, 'POST');
                
                showMessage("Visionnage validé ! Tu as obtenu 70 points.", "success");
                await fetchDashboardData();
                await loadStudyPanel(courseId, "Cours mis à jour");
            } catch (error) {
                console.error("Erreur de validation de présence :", error);
            }
        }

        async function generateFinalQuiz(courseId) {
            const container = document.getElementById(`quiz-container-${courseId}`);
            container.innerHTML = '<p style="color: #92400E;">Génération de l\'évaluation...</p>';

            try {
                const questions = await apiCall(`/api/etudiant/courses/${courseId}/quiz`, 'GET');
                
                if (questions.length === 0) {
                    container.innerHTML = `<p style="color: #DC2626; font-weight: bold;">L'enseignant n'a pas encore préparé de questions pour ce cours.</p>`;
                    return;
                }

                let formHTML = `<form onsubmit="event.preventDefault(); submitFinalQuiz(${courseId}, this)">`;
                questions.forEach((q, index) => {
                    formHTML += `
                        <div style="background: white; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; border: 1px solid #FDE68A;">
                            <strong style="display: block; margin-bottom: 0.5rem; color: #92400E;">Q${index + 1}. ${q.text}</strong>
                            ${q.choices.map(choice => `
                                <label style="display: block; margin-bottom: 0.4rem; cursor: pointer;">
                                    <!-- CORRECTION 4 : name="question_${q.question_id}" garantit un groupe radio UNIQUE par question -->
                                    <input type="radio" name="question_${q.question_id}" data-qid="${q.question_id}" value="${choice.id}" required>
                                    ${choice.text}
                                </label>
                            `).join('')}
                        </div>
                    `;
                });
                formHTML += `
                    <button type="submit" style="background: #D97706; color: white; width: 100%; margin-top: 0.5rem; padding: 0.75rem; border-radius: 6px; font-weight: bold; cursor: pointer;">Valider mes réponses</button>
                </form>`;

                container.innerHTML = formHTML;

            } catch (error) {
                container.innerHTML = `<p style="color: #DC2626;">Erreur de génération du quiz.</p>`;
            }
        }

        async function submitFinalQuiz(courseId, formElement) {
            const answers = [];
            formElement.querySelectorAll('input[type="radio"]:checked').forEach(input => {
                const questionId = Number(input.getAttribute('data-qid'));
                answers.push({ question_id: questionId, choice_id: Number(input.value) });
            });

            try {
                const payload = {
                    course_id: courseId,
                    answers: answers
                };
                
                const result = await apiCall(`/api/etudiant/courses/submit-quiz`, 'POST', payload);
                
                showMessage(`Quiz évalué ! Ta note finale est de ${result.new_progress}%`, "success");
                await fetchDashboardData();
                await loadStudyPanel(courseId, "Cours validé");
            } catch (error) {
                console.error("Erreur de soumission du quiz :", error);
            }
        }

        // 4. GESTION DES INSCRIPTIONS & CERTIFICATS

        async function enrollInCourse(courseId) {
            try {
                await apiCall(`/api/etudiant/enroll/${courseId}`, 'POST');
                showMessage("Inscription réussie !");
                fetchDashboardData(); 
            } catch (error) {}
        }

        function renderCertificates(certificates) {
            const container = document.getElementById('certificates-container');
            if (!container) return;
            
            if (!certificates || certificates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 1.5rem 0;">
                        <div style="font-size: 2rem;">📜</div>
                        <p style="color: #6B7280; font-size: 0.85rem;">Aucun certificat global obtenu.</p>
                    </div>`;
                return;
            }

            let listHTML = '<div style="display: flex; flex-direction: column; gap: 0.75rem;">';
            certificates.forEach(certif => {
                listHTML += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: #FFFBEB; border: 1px solid #FCD34D; border-radius: 6px;">
                        <div>
                            <strong style="color: #B45309; display: block;">🏆 ${certif.module_title}</strong>
                            <span style="font-size: 0.75rem; color: #D97706;">Délivré le ${new Date(certif.date_obtention).toLocaleDateString('fr-FR')}</span>
                        </div>
                        <button onclick="downloadModuleCertificate(${certif.module_id}, '${certif.module_title.replace(/'/g, "\\'")}')" style="background: #F59E0B; color: white; padding: 0.3rem 0.6rem; font-size: 0.8rem;">Voir le PDF</button>
                    </div>
                `;
            });
            listHTML += '</div>';
            container.innerHTML = listHTML;
        }

        function downloadCourseCertificate(courseId, courseTitle) {
            const url = `/certificate?student=${encodeURIComponent(currentStudentUsername)}&title=${encodeURIComponent(courseTitle)}&type=course&id=${courseId}`;
            window.open(url, '_blank');
        }

        function downloadModuleCertificate(moduleId, moduleTitle) {
            const url = `/certificate?student=${encodeURIComponent(currentStudentUsername)}&title=${encodeURIComponent(moduleTitle)}&type=module&id=${moduleId}`;
            window.open(url, '_blank');
        }


        // INITIALISATION

        async function fetchDashboardData() {
            try {
                const dashboardData = await apiCall('/api/etudiant/dashboard', 'GET'); 
                
                if (dashboardData.student_name) currentStudentUsername = dashboardData.student_name;

                renderEnrollments(dashboardData.enrollments);
                renderCertificates(dashboardData.certificates);
                
                const catalogData = await apiCall('/api/etudiant/catalog', 'GET');
                renderCatalog(catalogData, dashboardData.enrollments);
            } catch (error) {}
        }

        document.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
